<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 預算本 🐾</title>
    <style>
        :root {
            --bg-color: #e0f2ff; 
            --card-bg: rgba(255, 255, 255, 0.98); 
            --text-color: #5a5a5a;
            --candy-blue: #8ecae6; /* 稍微加深一點點 */
            --candy-pink: #ffafcc;
            --candy-yellow: #ffebaf;
            --border-color: #cde4f5;
        }

        body {
            background-color: var(--bg-color);
            /* === 終極更新：手繪感強烈的真實骨頭路徑 === */
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%236bb1ff' fill-opacity='0.7'%3E%3C!-- 清晰腳印 🐾 --%3E%3Ccircle cx='25' cy='15' r='4'/%3E%3Ccircle cx='15' cy='22' r='3.5'/%3E%3Ccircle cx='35' cy='22' r='3.5'/%3E%3Ccircle cx='25' cy='32' r='7'/%3E%3C!-- 清晰骨頭 🦴 (結構：兩端圓球+中間橫桿) --%3E%3Cg transform='rotate(45 90 30)'%3E%3Crect x='82' y='28' width='16' height='4' rx='2'/%3E%3Ccircle cx='82' cy='27' r='3.5'/%3E%3Ccircle cx='82' cy='33' r='3.5'/%3E%3Ccircle cx='98' cy='27' r='3.5'/%3E%3Ccircle cx='98' cy='33' r='3.5'/%3E%3C/g%3E%3C!-- 另一組腳印 --%3E%3Ccircle cx='85' cy='85' r='4'/%3E%3Ccircle cx='75' cy='92' r='3.5'/%3E%3Ccircle cx='95' cy='92' r='3.5'/%3E%3Ccircle cx='85' cy='102' r='7'/%3E%3C!-- 另一組骨頭 --%3E%3Cg transform='rotate(-30 30 90)'%3E%3Crect x='22' y='88' width='16' height='4' rx='2'/%3E%3Ccircle cx='22' cy='87' r='3.5'/%3E%3Ccircle cx='22' cy='93' r='3.5'/%3E%3Ccircle cx='38' cy='87' r='3.5'/%3E%3Ccircle cx='38' cy='93' r='3.5'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            
            font-family: "M PLUS Rounded 1c", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 420px; }

        h2 {
            text-align: center;
            background: var(--candy-yellow);
            padding: 15px;
            border-radius: 50px;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .input-group {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(162, 210, 255, 0.15);
            margin-bottom: 25px;
            border: 2px solid #fff;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            box-sizing: border-box;
            outline: none;
        }

        .add-btn {
            width: 100%;
            padding: 15px;
            background: var(--candy-blue);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .summary {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            color: #ff85a2;
            border: 2px solid #ffdeeb;
        }

        .item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #fff;
        }

        .delete-btn {
            background: var(--candy-pink);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 8px 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2> ฅ^•ﻌ•^ฅ 預算小本本 </h2>
    
    <div class="input-group">
        <input type="text" id="itemName" placeholder="🐶 想花在哪裡？" required>
        <input type="number" id="itemAmount" placeholder="💰 預計金額" required>
        <button class="add-btn" onclick="addItem()">記下來 ✨</button>
    </div>

    <div class="summary">
        🐾 預計支出: $<span id="totalAmount">0</span>
    </div>

    <ul class="item-list" id="itemList"></ul>
</div>

<script>
    let expenses = JSON.parse(localStorage.getItem('animalBudget_Final')) || [];
    window.onload = renderItems;

    function addItem() {
        const nameInput = document.getElementById('itemName');
        const amountInput = document.getElementById('itemAmount');
        if (!nameInput.value || !amountInput.value) return;
        expenses.push({ id: Date.now(), name: nameInput.value, amount: parseFloat(amountInput.value) });
        saveAndRender();
        nameInput.value = ''; amountInput.value = '';
    }

    function removeItem(id) {
        expenses = expenses.filter(item => item.id !== id);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('animalBudget_Final', JSON.stringify(expenses));
        renderItems();
    }

    function renderItems() {
        const list = document.getElementById('itemList');
        const totalDisplay = document.getElementById('totalAmount');
        let total = 0;
        list.innerHTML = '';
        expenses.forEach(item => {
            total += item.amount;
            const li = document.createElement('li');
            li.className = 'item';
            li.innerHTML = `
                <div><strong>${item.name}</strong><br><span style="color:#6bb1ff">$${item.amount.toLocaleString()}</span></div>
                <button class="delete-btn" onclick="removeItem(${item.id})">刪除</button>
            `;
            list.appendChild(li);
        });
        totalDisplay.innerText = total.toLocaleString();
    }
</script>

</body>
</html>
