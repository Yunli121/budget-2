<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐾 預算本 🐾</title>
    <style>
        :root {
            --bg-color: #eaf6ff;
            --card-bg: rgba(255, 255, 255, 0.98); 
            --text-color: #5a5a5a;
            --candy-blue: #a2d2ff;
            --candy-pink: #ffafcc;
            --candy-yellow: #ffebaf;
            --border-color: #d8ecfb;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#cbdff1 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            font-family: "M PLUS Rounded 1c", "Microsoft JhengHei", sans-serif;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        h2 {
            text-align: center;
            background: var(--candy-yellow);
            padding: 15px;
            border-radius: 50px;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .input-group {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(162, 210, 255, 0.1);
            margin-bottom: 25px;
            border: 2px solid #fff;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            background-color: #fcfdfe;
        }

        .add-btn {
            width: 100%;
            padding: 15px;
            background: var(--candy-blue);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(162, 210, 255, 0.3);
            margin-top: 10px;
        }

        .summary {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            color: #ff85a2;
            border: 2px solid #ffdeeb;
        }

        /* --- 明細置中排版 --- */
        .item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 1fr auto; /* 右側固定放刪除鈕 */
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid #fff;
        }

        .item-content {
            text-align: center; /* 內容置中 */
            padding-left: 50px; /* 補償右側按鈕空間，讓視覺真正靠中 */
        }

        /* 可編輯區域的提示感 */
        [contenteditable="true"] {
            outline: none;
            padding: 2px 5px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        [contenteditable="true"]:focus {
            background: #fff9e6;
            border-bottom: 2px dashed var(--candy-yellow);
        }

        .item-name {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .item-amount {
            color: var(--candy-blue);
            font-size: 0.95rem;
        }

        .delete-btn {
            background: var(--candy-pink);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 8px 15px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .decor-animal {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-size: 32px;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2> ฅ^•ﻌ•^ฅ 預算小本本 </h2>
    
    <div class="input-group">
        <input type="text" id="itemName" placeholder="🐈 想花在哪裡？" required>
        <input type="number" id="itemAmount" placeholder="💰 預計金額" required>
        <button class="add-btn" onclick="addItem()">記下來 ✨</button>
    </div>

    <div class="summary">
        🐾 預計支出: $<span id="totalAmount">0</span>
    </div>

    <div id="itemList"></div>
</div>

<div class="decor-animal">🐈</div>

<script>
    let expenses = JSON.parse(localStorage.getItem('editableBudgetApp')) || [];

    window.onload = renderItems;

    function addItem() {
        const nameInput = document.getElementById('itemName');
        const amountInput = document.getElementById('itemAmount');
        if (!nameInput.value || !amountInput.value) return;

        expenses.push({
            id: Date.now(),
            name: nameInput.value,
            amount: parseFloat(amountInput.value)
        });
        saveAndRender();
        nameInput.value = '';
        amountInput.value = '';
    }

    function removeItem(id) {
        expenses = expenses.filter(item => item.id !== id);
        saveAndRender();
    }

    // --- 編輯功能更新邏輯 ---
    function updateItem(id, field, value) {
        const index = expenses.findIndex(item => item.id === id);
        if (index === -1) return;

        if (field === 'amount') {
            // 清除非數字字元並轉成數值
            let cleanValue = parseFloat(value.replace(/[^0-9.]/g, ''));
            expenses[index].amount = isNaN(cleanValue) ? 0 : cleanValue;
        } else {
            expenses[index].name = value;
        }
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('editableBudgetApp', JSON.stringify(expenses));
        renderItems();
    }

    function renderItems() {
        const list = document.getElementById('itemList');
        const totalDisplay = document.getElementById('totalAmount');
        let total = 0;
        list.innerHTML = '';

        expenses.forEach(item => {
            total += item.amount;
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="item-content">
                    <span class="item-name" contenteditable="true" 
                          onblur="updateItem(${item.id}, 'name', this.innerText)">${item.name}</span>
                    <span class="item-amount" contenteditable="true" 
                          onblur="updateItem(${item.id}, 'amount', this.innerText)">$${item.amount.toLocaleString()}</span>
                </div>
                <button class="delete-btn" onclick="removeItem(${item.id})">刪除</button>
            `;
            list.appendChild(div);
        });
        totalDisplay.innerText = total.toLocaleString();
    }
</script>

</body>
</html>
